<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 ← Page Not Found | Stackly</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Raleway:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
<style>
  #error-page {
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 40px 20px;
    text-align: center;
  }
  .error-container {
    position: relative;
    z-index: 2;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .error-logo {
    height: 54px;
    width: auto;
    object-fit: contain;
    margin-bottom: 30px;
    transition: transform 0.3s ease;
  }
  .error-logo:hover {
    transform: scale(1.05);
  }
  .error-code {
    font-family: 'Raleway', sans-serif;
    font-size: 7.5rem;
    font-weight: 900;
    color: transparent;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    line-height: 1;
    margin-bottom: 15px;
    letter-spacing: -2px;
    animation: float 4s ease-in-out infinite alternate;
  }
  @keyframes float {
    0% { transform: translateY(0); }
    100% { transform: translateY(-12px); }
  }
  .error-title {
    font-family: 'Raleway', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
  }
  .error-desc {
    font-size: 0.88rem;
    color: rgba(255, 255, 255, 0.65);
    line-height: 1.65;
    margin-bottom: 36px;
  }
  .error-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .btn-back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 32px;
    background: var(--grad);
    color: #ffffff !important;
    font-size: 0.94rem;
    font-weight: 700;
    border-radius: 12px;
    text-decoration: none;
    box-shadow: 0 8px 25px rgba(255, 107, 53, 0.45);
    transition: all 0.3s ease;
    border: 2px solid #ffffff;
    cursor: pointer;
  }
  .btn-back:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 35px rgba(255, 107, 53, 0.55);
  }
  .btn-home {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 32px;
    background: rgba(255, 255, 255, 0.08);
    color: #ffffff !important;
    font-size: 0.94rem;
    font-weight: 700;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s ease;
    border: 2px solid rgba(255, 255, 255, 0.2);
    cursor: pointer;
  }
  .btn-home:hover {
    transform: translateY(-3px);
    background: rgba(255, 255, 255, 0.15);
    border-color: #ffffff;
  }
  .ambient-glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(13,148,136,0.18) 0%, transparent 70%);
    filter: blur(50px);
    top: -15%;
    left: -10%;
    z-index: 0;
    pointer-events: none;
  }
  .ambient-glow-2 {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
    filter: blur(60px);
    bottom: -20%;
    right: -10%;
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- CURSOR -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<section id="error-page">
  <!-- Glow Backdrops -->
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <div class="error-container">
    <div class="error-code">404</div>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-desc">Oops! The page you are looking for doesn't exist, has been removed, or is temporarily unavailable.</p>
    <div class="error-actions">
      <a href="#" class="btn-back" onclick="event.preventDefault(); history.back();">← Go Back</a>
      <a href="index.html" class="btn-home">🏠 Back To Home</a>
    </div>
  </div>
</section>

<!-- Cursor script -->
<script>
  const cd=document.getElementById('cur-dot'),cr=document.getElementById('cur-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function ac(){cd.style.left=mx+'px';cd.style.top=my+'px';rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(ac)})();
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>cr.classList.add('big'));
    el.addEventListener('mouseleave',()=>cr.classList.remove('big'));
  });
</script>
</body>
</html>
